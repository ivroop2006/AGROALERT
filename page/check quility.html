<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Check Crop Quality</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#f4f4f4;
}

header{
background:green;
color:white;
text-align:center;
padding:15px;
font-size:24px;
}

.container{
width:420px;
margin:40px auto;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h3{
text-align:center;
}

label{
font-weight:bold;
}

input, select{
width:100%;
padding:8px;
margin:8px 0 15px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:darkgreen;
}

#result{
text-align:center;
margin-top:15px;
font-weight:bold;
color:green;
}

</style>
</head>

<body>

<header id="header">
Crop Price Alert System
</header>

<div class="container">

<h3 id="title">Check Crop Quality</h3>

<form id="qualityForm">

<label id="farmerLabel">Farmer Name</label>
<input type="text" id="farmer" required>

<label id="cropLabel">Crop Name</label>
<input type="text" id="crop" required>

<label id="moistureLabel">Moisture Level (%)</label>
<input type="number" id="moisture" required>

<label id="imageLabel">Upload Crop Image</label>
<input type="file" id="image">

<button type="submit" id="checkBtn">Check Quality</button>

</form>

<div id="result"></div>

</div>

<script>

// language dictionary
const translations = {

en:{
header:"Crop Price Alert System",
title:"Check Crop Quality",
farmerLabel:"Farmer Name",
cropLabel:"Crop Name",
moistureLabel:"Moisture Level (%)",
imageLabel:"Upload Crop Image",
checkBtn:"Check Quality",
gradeA:"Crop Quality: Grade A (Excellent)",
gradeB:"Crop Quality: Grade B (Good)",
gradeC:"Crop Quality: Grade C (Poor)"
},

hi:{
header:"फसल मूल्य अलर्ट सिस्टम",
title:"फसल की गुणवत्ता जांचें",
farmerLabel:"किसान का नाम",
cropLabel:"फसल का नाम",
moistureLabel:"नमी स्तर (%)",
imageLabel:"फसल की तस्वीर अपलोड करें",
checkBtn:"गुणवत्ता जांचें",
gradeA:"फसल गुणवत्ता: ग्रेड A (उत्कृष्ट)",
gradeB:"फसल गुणवत्ता: ग्रेड B (अच्छा)",
gradeC:"फसल गुणवत्ता: ग्रेड C (कमजोर)"
},

mr:{
header:"पीक किंमत अलर्ट सिस्टम",
title:"पीक गुणवत्ता तपासा",
farmerLabel:"शेतकऱ्याचे नाव",
cropLabel:"पीक नाव",
moistureLabel:"आर्द्रता पातळी (%)",
imageLabel:"पीक फोटो अपलोड करा",
checkBtn:"गुणवत्ता तपासा",
gradeA:"पीक गुणवत्ता: ग्रेड A (उत्कृष्ट)",
gradeB:"पीक गुणवत्ता: ग्रेड B (चांगले)",
gradeC:"पीक गुणवत्ता: ग्रेड C (कमकुवत)"
}

};

// get selected language
let lang = localStorage.getItem("selectedLanguage") || "en";

function applyLanguage(){

let t = translations[lang];

document.getElementById("header").innerText=t.header;
document.getElementById("title").innerText=t.title;
document.getElementById("farmerLabel").innerText=t.farmerLabel;
document.getElementById("cropLabel").innerText=t.cropLabel;
document.getElementById("moistureLabel").innerText=t.moistureLabel;
document.getElementById("imageLabel").innerText=t.imageLabel;
document.getElementById("checkBtn").innerText=t.checkBtn;

}

applyLanguage();

document.getElementById("qualityForm").addEventListener("submit", function(e){

e.preventDefault();

let moisture=document.getElementById("moisture").value;
let result=document.getElementById("result");
let t=translations[lang];

if(moisture <= 10){
result.innerHTML=t.gradeA;
}
else if(moisture <= 20){
result.innerHTML=t.gradeB;
}
else{
result.innerHTML=t.gradeC;
}

});

</script>

</body>
</html>
