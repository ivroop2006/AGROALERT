<!DOCTYPE html>
<html lang="en">

<title>Daily Market Updates</title>

<style>

body{

margin:0;
background:#f4f4f4;
}

header{
background:green;
color:white;
text-align:center;
padding:15px;
font-size:24px;
}

.container{
width:80%;
margin:30px auto;
}

.news-card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:6px;
box-shadow:0 0 8px rgba(0,0,0,0.1);
}

.news-card h3{
color:green;
}

.date{
font-size:14px;
color:gray;
}

</style>
</head>

<body>

<header id="header">
Crop Price Alert System - Daily Market News
</header>

<div class="container">

<div class="news-card">
<h3 id="n1"></h3>
<p class="date" id="d1"></p>
<p id="p1"></p>
</div>

<div class="news-card">
<h3 id="n2"></h3>
<p class="date" id="d2"></p>
<p id="p2"></p>
</div>

<div class="news-card">
<h3 id="n3"></h3>
<p class="date" id="d3"></p>
<p id="p3"></p>
</div>

<div class="news-card">
<h3 id="n4"></h3>
<p class="date" id="d4"></p>
<p id="p4"></p>
</div>

</div>
