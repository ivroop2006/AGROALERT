<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crop Price Alert System</title>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

/* Background */

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg, rgba(0,150,0,0.6), rgba(0,80,0,0.6)),
url("farmer image.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* Main card */

.container{
text-align:center;
background:rgba(255,255,255,0.15);
padding:60px;
border-radius:25px;
backdrop-filter:blur(15px);
box-shadow:0 10px 40px rgba(0,0,0,0.4);
border:1px solid rgba(255,255,255,0.3);
}

/* Logo */

.logo{
width:200px;
height:200px;
border-radius:50%;
border:5px solid white;
box-shadow:0 0 25px rgba(255,255,255,0.7);
margin-bottom:25px;
animation:zoom 3s ease-in-out;
}

/* Logo animation */

@keyframes zoom{
0%{transform:scale(0.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

/* Title */

h1{
color:white;
font-size:45px;
letter-spacing:2px;
margin-bottom:10px;
text-shadow:2px 2px 10px black;
}

/* Subtitle */

p{
color:#e8f5e9;
font-size:20px;
margin-bottom:20px;
}

/* Loading dots */

.loading{
color:white;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">
  <img src="/images/logoimage.jpg" class="logo">

<h1>SmartKisan</h1>

<p>Get Real-Time Market Price Updates For Farmers</p>

<div class="loading">Loading...</div>

</div>

<script>

/* After 2 seconds open login page */

setTimeout(function(){
window.location.href="home.html";
},2000);

</script>

</body>
</html>
