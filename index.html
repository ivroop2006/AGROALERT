<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Login - Crop Price Alert System</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6') no-repeat center center/cover;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
.login-container {
    background: rgba(0, 0, 0, 0.7);
    padding: 40px;
    border-radius: 10px;
    width: 350px;
    color: white;
    text-align: center;
}
.login-container h2 {
    margin-bottom: 25px;
}
.input-group {
    margin-bottom: 20px;
    text-align: left;
}
.input-group label {
    font-size: 14px;
}
.input-group input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: none;
    border-radius: 5px;
}
.login-btn {
    width: 100%;
    padding: 12px;
    background-color: #ffeb3b;
    border: none;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
}
.login-btn:hover {
    background-color: #fdd835;
}
.register-link {
    margin-top: 15px;
    font-size: 14px;
}
.register-link a {
    color: #ffeb3b;
    text-decoration: none;
}
.register-link a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>
<div class="login-container">

<h2 id="loginTitle">Farmer Login</h2>

<form id="loginForm">
<div class="input-group">
<label id="emailLabel">Email or Mobile Number</label>
<input id="emailInput" type="text" name="email" placeholder="Enter Email or Mobile" required>
</div>

<div class="input-group">
<label id="passLabel">Password</label>
<input id="passInput" type="password" name="password" placeholder="Enter Password" required>
</div>

<button type="submit" id="loginBtn" class="login-btn">Login</button>

<p id="successMsg" style="color:lightgreen;font-weight:bold;display:none;"></p>

<div class="register-link">
<span id="registerText">Don’t have an account?</span>
<a target="_self" id="registerLink" href="/crop_price_alert_system/page/register.html">Register Here</a>
</div>

</form>
</div>

<script>
// Language support
const translations = {
    en:{ fill:"Please fill all fields", loginSuccess:"Login Successful" },
    hi:{ fill:"सभी फ़ील्ड भरें", loginSuccess:"लॉगिन सफल हुआ" },
    mr:{ fill:"सर्व फील्ड भरा", loginSuccess:"लॉगिन यशस्वी झाले" }
};

let lang = localStorage.getItem("language") || "en";

// Set labels based on language
function setLabels() {
    if(lang==="hi"){
        document.getElementById("loginTitle").innerText="किसान लॉगिन";
        document.getElementById("emailLabel").innerText="ईमेल या मोबाइल नंबर";
        document.getElementById("emailInput").placeholder="ईमेल या मोबाइल दर्ज करें";
        document.getElementById("passLabel").innerText="पासवर्ड";
        document.getElementById("passInput").placeholder="पासवर्ड दर्ज करें";
        document.getElementById("loginBtn").innerText="लॉगिन";
        document.getElementById("registerText").innerText="खाता नहीं है?";
        document.getElementById("registerLink").innerText="यहाँ रजिस्टर करें";
    } else if(lang==="mr"){
        document.getElementById("loginTitle").innerText="शेतकरी लॉगिन";
        document.getElementById("emailLabel").innerText="ईमेल किंवा मोबाईल नंबर";
        document.getElementById("emailInput").placeholder="ईमेल किंवा मोबाईल टाका";
        document.getElementById("passLabel").innerText="पासवर्ड";
        document.getElementById("passInput").placeholder="पासवर्ड टाका";
        document.getElementById("loginBtn").innerText="लॉगिन";
        document.getElementById("registerText").innerText="खाते नाही?";
        document.getElementById("registerLink").innerText="इथे नोंदणी करा";
    } else {
        document.getElementById("loginTitle").innerText="Farmer Login";
        document.getElementById("emailLabel").innerText="Email or Mobile Number";
        document.getElementById("emailInput").placeholder="Enter Email or Mobile";
        document.getElementById("passLabel").innerText="Password";
        document.getElementById("passInput").placeholder="Enter Password";
        document.getElementById("loginBtn").innerText="Login";
        document.getElementById("registerText").innerText="Don’t have an account?";
        document.getElementById("registerLink").innerText="Register Here";
    }
}
setLabels();

// Handle login with AJAX
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    let email = document.getElementById("emailInput").value.trim();
    let password = document.getElementById("passInput").value.trim();

    if(email === "" || password === ""){
        alert(translations[lang].fill);
        return;
    }

    // Send login request with language
    fetch('/backend/api/login.php', {
        method: 'POST',
        body: new URLSearchParams({email: email, password: password, lang: lang})
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "success"){
            // Save user_id to localStorage for alerts system
            localStorage.setItem("user_id", data.user_id);
            localStorage.setItem("language", lang);

            alert(data.message); // message is already localized from backend
            window.location.href = '/crop_price_alert_system/dashboard1.html';
        } else {
            alert(data.message);
        }
    })
    .catch(err => {
        alert(lang==='hi' ? "सर्वर से कनेक्ट करने में त्रुटि" : (lang==='mr' ? "सर्व्हरशी कनेक्ट करताना त्रुटी" : "Error connecting to server"));
        console.error(err);
    });
});
</script>

</body>
</html>
